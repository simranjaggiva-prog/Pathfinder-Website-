name: Monthly Savill Video Freshness Check

on:
  schedule:
    # Runs on the 1st of every month at 09:00 UTC
    - cron: '0 9 1 * *'
  workflow_dispatch:

jobs:
  check-videos:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Check for newer John Savill study cram videos
        id: check
        run: |
          python3 << 'EOF'
          import urllib.request
          import xml.etree.ElementTree as ET
          import re
          import json

          # John Savill's YouTube channel RSS feed (no API key needed)
          CHANNEL_RSS = "https://www.youtube.com/feeds/videos.xml?channel_id=UCpVm7bg6pXKo1Pr6k5kxG9A"

          # Exam codes present in the site — we look for newer study crams for these
          EXAM_CODES = [
              "AZ-900", "AZ-104", "AZ-204", "AZ-305", "AZ-400", "AZ-500",
              "AI-900", "AI-102",
              "DP-900", "DP-100", "DP-700",
              "SC-900", "SC-200", "SC-300",
              "PL-900", "PL-300",
              "MS-900",
          ]

          # Current video IDs hardcoded in the site
          with open("index.html", "r", encoding="utf-8") as f:
              html = f.read()

          current_ids = set(re.findall(r'youtu\.be/([A-Za-z0-9_\-]+)', html))
          print(f"Current video IDs in site: {current_ids}")

          # Fetch RSS feed
          try:
              with urllib.request.urlopen(CHANNEL_RSS, timeout=30) as resp:
                  rss_data = resp.read()
          except Exception as e:
              print(f"Failed to fetch RSS: {e}")
              exit(0)

          ns = {
              'atom': 'http://www.w3.org/2005/Atom',
              'yt': 'http://www.youtube.com/xml/schemas/2015',
          }
          tree = ET.fromstring(rss_data)
          entries = tree.findall('atom:entry', ns)

          newer_videos = []
          for entry in entries:
              title_el = entry.find('atom:title', ns)
              link_el = entry.find('atom:link', ns)
              vid_id_el = entry.find('yt:videoId', ns)
              if title_el is None or link_el is None or vid_id_el is None:
                  continue

              title = title_el.text or ""
              url = link_el.get('href', '')
              vid_id = vid_id_el.text or ""

              # Check if title contains an exam code and "study cram" or "cram"
              title_lower = title.lower()
              if "cram" not in title_lower and "study" not in title_lower:
                  continue

              for code in EXAM_CODES:
                  if code.lower() in title_lower and vid_id not in current_ids:
                      newer_videos.append({"exam": code, "title": title, "url": url, "id": vid_id})
                      break

          if newer_videos:
              lines = ["## Newer John Savill Study Cram Videos Found\n",
                       "The following videos were published to John Savill's channel and are **not** currently linked in the site.\n",
                       "Review each one and update the relevant `savillVideos` array in `microsoft-career-navigator.html`.\n",
                       ""]
              for v in newer_videos:
                  lines.append(f"- **{v['exam']}** — [{v['title']}]({v['url']})")
              lines.append("")
              lines.append("_This issue was auto-generated by the monthly Savill video freshness check._")
              report = "\n".join(lines)
              with open("savill_report.md", "w") as f:
                  f.write(report)
              print("NEWER_FOUND=true")
              with open("$GITHUB_OUTPUT", "a") as f:
                  f.write("newer_found=true\n")
          else:
              print("All Savill study cram videos appear to be current.")
              with open("$GITHUB_OUTPUT", "a") as f:
                  f.write("newer_found=false\n")
          EOF

      - name: Write GitHub output
        id: result
        run: |
          if [ -f savill_report.md ]; then
            echo "newer_found=true" >> $GITHUB_OUTPUT
          else
            echo "newer_found=false" >> $GITHUB_OUTPUT
          fi

      - name: Create issue if newer videos found
        if: steps.result.outputs.newer_found == 'true'
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: "New John Savill study cram videos available — ${{ github.run_id }}"
          content-filepath: ./savill_report.md
          labels: |
            content-update
            savill-videos
